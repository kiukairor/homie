apiVersion: apps/v1
kind: Deployment
metadata:
  name: backend
  namespace: homie-prod
spec:
  replicas: 1
  selector:
    matchLabels:
      app: backend
  template:
    metadata:
      labels:
        app: backend
    spec:
      containers:
        - name: backend
          image: ghcr.io/kiukairor/homie-backend:latest
          ports:
            - containerPort: 8000
          env:
            - name: DATABASE_URL
              value: postgresql+asyncpg://homie:$(POSTGRES_PASSWORD)@postgres:5432/homie
            - name: REDIS_URL
              value: redis://redis:6379
            - name: OLLAMA_BASE_URL
              value: http://ollama:11434
            - name: OLLAMA_MODEL
              value: mistral:7b
            - name: POSTGRES_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: homie-secrets
                  key: postgres-password
            - name: ANTHROPIC_API_KEY
              valueFrom:
                secretKeyRef:
                  name: homie-secrets
                  key: anthropic-api-key
                  optional: true
            - name: TELEGRAM_BOT_TOKEN
              valueFrom:
                secretKeyRef:
                  name: homie-secrets
                  key: telegram-bot-token
                  optional: true
            - name: TELEGRAM_WEBHOOK_SECRET
              valueFrom:
                secretKeyRef:
                  name: homie-secrets
                  key: telegram-webhook-secret
                  optional: true
          readinessProbe:
            httpGet:
              path: /api/health
              port: 8000
            initialDelaySeconds: 10
            periodSeconds: 10
          resources:
            requests:
              memory: "256Mi"
              cpu: "100m"
            limits:
              memory: "512Mi"
              cpu: "500m"
