apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: homie
  namespace: argocd
spec:
  project: default

  source:
    repoURL: https://github.com/kiukairor/homie.git
    targetRevision: main
    path: k8s/overlays/prod

  destination:
    server: https://kubernetes.default.svc   # local cluster (ArgoCD running on same k3s)
    namespace: homie-prod

  syncPolicy:
    automated:
      prune: true        # remove resources deleted from Git
      selfHeal: true     # revert manual kubectl changes
    syncOptions:
      - CreateNamespace=true
