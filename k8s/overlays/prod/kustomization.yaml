apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

namespace: homie-prod

resources:
  - ../../base
  - gateway.yaml
  - httproute.yaml
  - certificate.yaml
  - cluster-issuer.yaml

# Pin image tags for prod — updated automatically by CI on each push
images:
  - name: ghcr.io/kiukairor/homie-backend
    newTag: latest  # backend
  - name: ghcr.io/kiukairor/homie-frontend
    newTag: latest  # frontend
