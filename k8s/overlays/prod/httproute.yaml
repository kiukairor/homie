# HTTP → HTTPS redirect
apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: redirect-to-https
  namespace: homie-prod
spec:
  parentRefs:
    - name: homie-gateway
      sectionName: web
  rules:
    - filters:
        - type: RequestRedirect
          requestRedirect:
            scheme: https
            statusCode: 301

---
# Main HTTPS routes
apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: homie-routes
  namespace: homie-prod
spec:
  parentRefs:
    - name: homie-gateway
      sectionName: websecure
  hostnames:
    - YOUR_DOMAIN    # replace with your domain e.g. homie.example.com
  rules:
    # API — backend
    - matches:
        - path:
            type: PathPrefix
            value: /api
      backendRefs:
        - name: backend
          port: 8000

    # Telegram/WhatsApp webhook — backend
    - matches:
        - path:
            type: PathPrefix
            value: /webhook
      backendRefs:
        - name: backend
          port: 8000

    # Everything else — frontend PWA
    - matches:
        - path:
            type: PathPrefix
            value: /
      backendRefs:
        - name: frontend
          port: 80
